<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetJov</title>
  <meta name="description" content="GetJov - בקרוב" />
  <style>
    :root {
      --bg: #0b0b0f;
      --bg-soft: #12121a;
      --card: rgba(20, 20, 28, 0.82);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --gold: #facc15;
      --red: #fe2c55;
      --glow-red: rgba(254, 44, 85, 0.22);
      --glow-gold: rgba(250, 204, 21, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --radius-xl: 32px;
      --radius-lg: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, var(--glow-red), transparent 28%),
        radial-gradient(circle at bottom left, var(--glow-gold), transparent 30%),
        linear-gradient(180deg, #09090d 0%, #0b0b0f 45%, #111118 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 14px;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      max-width: 460px;
      position: relative;
    }

    .glow {
      position: absolute;
      inset: auto;
      border-radius: 999px;
      filter: blur(40px);
      pointer-events: none;
      z-index: 0;
    }

    .glow.top {
      width: 180px;
      height: 180px;
      top: 10px;
      right: 10px;
      background: var(--glow-red);
    }

    .glow.bottom {
      width: 180px;
      height: 180px;
      bottom: 20px;
      left: 10px;
      background: var(--glow-gold);
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      background: linear-gradient(180deg, rgba(24,24,32,0.92), rgba(15,15,22,0.88));
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 22px 18px 26px;
      text-align: center;
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(
        135deg,
        rgba(250, 204, 21, 0.10),
        rgba(254, 44, 85, 0.10),
        transparent 55%
      );
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: auto;
      height: 58px;
      max-width: 180px;
      object-fit: contain;
      display: block;
    }

    .brand {
      position: relative;
      z-index: 1;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.6px;
      margin: 6px 0 6px;
      background: linear-gradient(90deg, #fff1ae 0%, var(--gold) 35%, #ff8ea5 70%, var(--red) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .soon {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), var(--red));
      box-shadow: 0 0 14px rgba(254, 44, 85, 0.35);
    }

    .phone-wrap {
      position: relative;
      z-index: 1;
      margin-top: 22px;
      display: flex;
      justify-content: center;
    }

    .phone-frame {
      width: 100%;
      max-width: 320px;
      padding: 10px;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 20px 50px rgba(0,0,0,0.42);
    }

    .phone-image {
      width: 100%;
      display: block;
      border-radius: 24px;
      object-fit: cover;
      background: #0f0f14;
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.42);
      font-weight: 700;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px 10px;
      }

      .card {
        padding: 18px 14px 22px;
        border-radius: 26px;
      }

      .logo {
        height: 52px;
        max-width: 160px;
      }

      .brand {
        font-size: 26px;
      }

      .phone-frame {
        max-width: 280px;
        border-radius: 28px;
      }

      .phone-image {
        border-radius: 20px;
      }

      .soon {
        font-size: 12px;
        padding: 9px 12px;
      }
    }

    @media (min-width: 768px) {
      .page {
        max-width: 520px;
      }

      .card {
        padding: 28px 24px 30px;
      }

      .logo {
        height: 64px;
      }

      .brand {
        font-size: 34px;
      }

      .phone-frame {
        max-width: 340px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="glow top"></div>
    <div class="glow bottom"></div>

    <div class="card">
      <div class="logo-wrap">
        <img src="logo.png" alt="GetJov Logo" class="logo" />
      </div>

      <div class="brand">GetJov</div>

      <div class="soon">
        <span class="dot"></span>
        <span>Coming Soon</span>
      </div>

      <div class="phone-wrap">
        <div class="phone-frame">
          <img src="app1.png" alt="GetJov App Preview" class="phone-image" />
        </div>
      </div>

      <div class="footer">getjov.com</div>
    </div>
  </div>
</body>
</html>
