<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetJov</title>

  <!-- FAVICON (לוגו בדפדפן) -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=5">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png?v=5">
  <link rel="shortcut icon" href="favicon.png?v=5">

  <meta name="description" content="GetJov - האפליקציה שתשנה לך את החיים. בקרוב." />

  <style>
    :root {
      --bg: #0b0b0f;
      --bg-2: #111118;
      --card: rgba(20, 20, 28, 0.9);
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.7);
      --red: #fe2c55;
      --yellow: #facc15;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg,#08080c,#0b0b0f);
    }

    .topbar {
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      background: rgba(11,11,15,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-align: center;
      padding: 14px;
    }

    .topbar img {
      height: 40px;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 20px;
    }

    .hero h1 {
      font-size: 42px;
      line-height: 1.1;
    }

    .gradient {
      background: linear-gradient(90deg,#FACC15,#FE2C55);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--muted);
      max-width: 500px;
      margin: 20px auto;
      line-height: 1.6;
    }

    .phone {
      width: 260px;
      margin-top: 30px;
      border-radius: 20px;
    }

    .features {
      padding: 40px 20px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .feature {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      width: 250px;
    }

    .cta {
      text-align: center;
      padding: 40px 20px;
    }

    .btn {
      background: linear-gradient(90deg,#FACC15,#FE2C55);
      border: none;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>

<body>

  <div class="topbar">
    <img src="logo.png?v=5">
  </div>

  <section class="hero">
    <h1>
      האפליקציה<br>
      <span class="gradient">שתשנה לך את החיים</span>
    </h1>

    <p>
      משהו גדול בדרך. חוויה חדשה, חכמה ומדויקת יותר.
    </p>

    <img src="app1.png" class="phone">
  </section>

  <section class="features">
    <div class="feature">⚡ חוויה מהירה וחדשנית</div>
    <div class="feature">🎯 ממשק חכם ופשוט</div>
    <div class="feature">🚀 מוצר חדש בדרך</div>
  </section>

  <section class="cta">
    <button class="btn">בקרוב</button>
  </section>

  <div class="footer">
    GetJov © 2026
  </div>

</body>
</html>
