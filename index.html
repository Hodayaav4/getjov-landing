<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetJov</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="favicon.png?v=20" />

  <style>
    :root {
      --bg: #0b0b0f;
      --bg2: #111118;
      --card: rgba(20,20,28,0.8);
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.7);
      --red: #fe2c55;
      --yellow: #facc15;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial;
      color: var(--text);

      background:
        radial-gradient(circle at 20% 20%, rgba(254,44,85,0.15), transparent),
        radial-gradient(circle at 80% 80%, rgba(250,204,21,0.15), transparent),
        linear-gradient(180deg, #050507, #0b0b0f);
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;

      height: 70px;
      background: #000;

      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    }

    .header-inner {
      max-width: 1200px;
      height: 100%;

      margin: 0 auto;
      padding: 0 20px;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      height: 38px;
      width: auto;

      filter:
        drop-shadow(0 0 6px rgba(250,204,21,0.25))
        drop-shadow(0 0 10px rgba(254,44,85,0.2));

      transition: 0.3s;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }

    h1 {
      font-size: 48px;
      line-height: 1.1;
    }

    .gradient {
      background: linear-gradient(90deg,#FACC15,#FE2C55);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--muted);
      max-width: 500px;
      margin: 20px auto;
      line-height: 1.6;
    }

    /* ===== PHONE IMAGE ===== */
    .phone {
      width: 260px;
      margin-top: 40px;
      border-radius: 20px;

      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    /* ===== FEATURES ===== */
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      padding: 40px 20px;
    }

    .feature {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      width: 260px;
      backdrop-filter: blur(10px);

      transition: 0.3s;
    }

    .feature:hover {
      transform: translateY(-5px);
    }

    /* ===== CTA ===== */
    .cta {
      text-align: center;
      padding: 40px;
    }

    .btn {
      background: linear-gradient(90deg,#FACC15,#FE2C55);
      border: none;
      padding: 14px 26px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;

      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.4);
    }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {
      h1 {
        font-size: 34px;
      }

      .phone {
        width: 200px;
      }

      .logo {
        height: 34px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <img src="logo.png?v=20" class="logo" />
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>
      האפליקציה<br>
      <span class="gradient">שתשנה לך את החיים</span>
    </h1>

    <p>
      משהו גדול בדרך. חוויה חדשה, מהירה ומדויקת יותר.
    </p>

    <img src="app1.png" class="phone" />
  </section>

  <!-- FEATURES -->
  <section class="features">
    <div class="feature">⚡ חוויה מהירה</div>
    <div class="feature">🎯 ממשק חכם</div>
    <div class="feature">🚀 מוצר חדש</div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <button class="btn">בקרוב</button>
  </section>

  <!-- FOOTER -->
  <div class="footer">
    GetJov © 2026
  </div>

</body>
</html>
