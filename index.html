<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetJov</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0B0B0F;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* לוגו */
    .logo {
      width: 80px;
      margin-bottom: 20px;
    }

    /* כותרת */
    h1 {
      font-size: 32px;
      margin: 10px 0;
      background: linear-gradient(90deg, #FACC15, #FE2C55);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* בקרוב */
    .coming {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.7;
    }

    /* תמונה */
    .phone {
      margin-top: 40px;
      width: 280px;
      max-width: 90%;
      display: block;
    }
  </style>
</head>

<body>

  <!-- לוגו -->
  <img src="logo.png" class="logo">

  <!-- שם -->
  <h1>GetJov</h1>

  <!-- בקרוב -->
  <div class="coming">Coming Soon</div>

  <!-- תמונת אפליקציה -->
  <img src="app1.png" class="phone">

</body>
</html>
