<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetJov</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0B0B0F;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    .phone {
      width: 280px;
      margin: 20px 0;
      animation: float 3s ease-in-out infinite;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      margin-top: 10px;
      background: linear-gradient(90deg, #FACC15, #FE2C55);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin-top: 10px;
      color: rgba(255,255,255,0.7);
      font-size: 16px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @keyframes float {
      0% { transform: translateY(0px);}
      50% { transform: translateY(-15px);}
      100% { transform: translateY(0px);}
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- לוגו -->
    <img src="logo.png" class="logo">

    <!-- פלאפון -->
    <img src="app1.png" class="phone">

    <!-- טקסט -->
    <div class="title">GetJov</div>
    <div class="subtitle">Coming Soon</div>

  </div>

</body>
</html>
