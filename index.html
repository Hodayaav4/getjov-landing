<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetJov</title>

  <style>
    :root {
      --bg: #0b0b0f;
      --card: rgba(20, 20, 28, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.65);
      --gold: #facc15;
      --red: #fe2c55;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #15151d, #0b0b0f);
      color: var(--text);
      padding-top: 70px;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(11,11,15,0.75);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 999;
    }

    .logo-top {
      height: 38px;
    }

    /* MAIN */
    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 25px 20px 30px;
      backdrop-filter: blur(15px);
    }

    .brand {
      font-size: 28px;
      font-weight: bold;
      margin-top: 10px;
      background: linear-gradient(90deg, var(--gold), var(--red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .soon {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .phone {
      width: 100%;
      max-width: 280px;
      margin-top: 25px;
      border-radius: 22px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* MOBILE */
    @media (max-width: 480px) {
      .brand {
        font-size: 24px;
      }

      .phone {
        max-width: 240px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <img src="logo.png" class="logo-top">
  </header>

  <!-- CONTENT -->
  <div class="container">
    <div class="card">

      <div class="brand">GetJov</div>
      <div class="soon">Coming Soon</div>

      <img src="app1.png" class="phone">

      <div class="footer">getjov.com</div>

    </div>
  </div>

</body>
</html>
